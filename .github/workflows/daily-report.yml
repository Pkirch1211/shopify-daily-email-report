name: Daily Sales Report

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:
    inputs:
      schedule:
        description: 'Which schedule to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - dtc
          - wholesale
      date_range:
        description: 'Date range'
        required: true
        default: 'yesterday'
        type: choice
        options:
          - yesterday
          - 7days
          - 30days

jobs:
  send-all-stores:
    name: All Stores Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.schedule == 'all'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send All Stores report
        env:
          SHOPIFY_DTC_STORE:       ${{ secrets.SHOPIFY_DTC_STORE }}
          SHOPIFY_DTC_TOKEN:       ${{ secrets.SHOPIFY_DTC_TOKEN }}
          SHOPIFY_WHOLESALE_STORE: ${{ secrets.SHOPIFY_WHOLESALE_STORE }}
          SHOPIFY_WHOLESALE_TOKEN: ${{ secrets.SHOPIFY_WHOLESALE_TOKEN }}
          GMAIL_USER:              ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:              ${{ secrets.GMAIL_PASS }}
          GMAIL_FROM:              ${{ secrets.GMAIL_FROM }}
          RECIPIENTS_ALL:          ${{ vars.RECIPIENTS_ALL }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          DATE_RANGE:              ${{ github.event.inputs.date_range || 'yesterday' }}
          SHOPIFY_MAX_RETRIES:     ${{ vars.SHOPIFY_MAX_RETRIES }}
          SHOPIFY_PAGE_DELAY_MS:   ${{ vars.SHOPIFY_PAGE_DELAY_MS }}
          SHOPIFY_RETRY_BASE_MS:   ${{ vars.SHOPIFY_RETRY_BASE_MS }}
          FAIL_ON_STORE_ERROR:     ${{ vars.FAIL_ON_STORE_ERROR }}
        run: node send-report.js --schedule all

  send-dtc-only:
    name: DTC Only Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.schedule == 'dtc'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send DTC report
        env:
          SHOPIFY_DTC_STORE:       ${{ secrets.SHOPIFY_DTC_STORE }}
          SHOPIFY_DTC_TOKEN:       ${{ secrets.SHOPIFY_DTC_TOKEN }}
          GMAIL_USER:              ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:              ${{ secrets.GMAIL_PASS }}
          GMAIL_FROM:              ${{ secrets.GMAIL_FROM }}
          RECIPIENTS_DTC:          ${{ vars.RECIPIENTS_DTC }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          DATE_RANGE:              ${{ github.event.inputs.date_range || 'yesterday' }}
          SHOPIFY_MAX_RETRIES:     ${{ vars.SHOPIFY_MAX_RETRIES }}
          SHOPIFY_PAGE_DELAY_MS:   ${{ vars.SHOPIFY_PAGE_DELAY_MS }}
          SHOPIFY_RETRY_BASE_MS:   ${{ vars.SHOPIFY_RETRY_BASE_MS }}
          FAIL_ON_STORE_ERROR:     ${{ vars.FAIL_ON_STORE_ERROR }}
        run: node send-report.js --schedule dtc

  send-wholesale-only:
    name: Wholesale Only Report
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.schedule == 'wholesale'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send Wholesale report
        env:
          SHOPIFY_WHOLESALE_STORE: ${{ secrets.SHOPIFY_WHOLESALE_STORE }}
          SHOPIFY_WHOLESALE_TOKEN: ${{ secrets.SHOPIFY_WHOLESALE_TOKEN }}
          GMAIL_USER:              ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:              ${{ secrets.GMAIL_PASS }}
          GMAIL_FROM:              ${{ secrets.GMAIL_FROM }}
          RECIPIENTS_ALL:          ${{ vars.RECIPIENTS_ALL }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          DATE_RANGE:              ${{ github.event.inputs.date_range || 'yesterday' }}
          SHOPIFY_MAX_RETRIES:     ${{ vars.SHOPIFY_MAX_RETRIES }}
          SHOPIFY_PAGE_DELAY_MS:   ${{ vars.SHOPIFY_PAGE_DELAY_MS }}
          SHOPIFY_RETRY_BASE_MS:   ${{ vars.SHOPIFY_RETRY_BASE_MS }}
          FAIL_ON_STORE_ERROR:     ${{ vars.FAIL_ON_STORE_ERROR }}
        run: node send-report.js --schedule wholesale
