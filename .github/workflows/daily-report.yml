name: Daily Sales Report

on:
  schedule:
    # 08:30 UTC = 03:30 EST (UTC-8) — runs every day
    - cron: '30 8 * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      schedule:
        description: 'Which schedule to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - dtc
      date_range:
        description: 'Date range'
        required: true
        default: 'yesterday'
        type: choice
        options:
          - yesterday
          - 7days
          - 30days

jobs:
  send-all-stores:
    name: All Stores Report
    runs-on: ubuntu-latest
    # Only run on schedule (not manual dispatch, unless explicitly chosen)
    if: github.event_name == 'schedule' || github.event.inputs.schedule == 'all'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send All Stores report
        env:
          SHOPIFY_DTC_STORE:       ${{ secrets.SHOPIFY_DTC_STORE }}
          SHOPIFY_DTC_TOKEN:       ${{ secrets.SHOPIFY_DTC_TOKEN }}
          SHOPIFY_WHOLESALE_STORE: ${{ secrets.SHOPIFY_WHOLESALE_STORE }}
          SHOPIFY_WHOLESALE_TOKEN: ${{ secrets.SHOPIFY_WHOLESALE_TOKEN }}
          GMAIL_USER:              ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:              ${{ secrets.GMAIL_PASS }}
          GMAIL_FROM:              ${{ secrets.GMAIL_FROM }}
          RECIPIENTS_ALL:          ${{ secrets.RECIPIENTS_ALL }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          DATE_RANGE:              ${{ github.event.inputs.date_range || 'yesterday' }}
        run: node send-report.js --schedule all

  send-dtc-only:
    name: DTC Only Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.schedule == 'dtc'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send DTC report
        env:
          SHOPIFY_DTC_STORE: ${{ secrets.SHOPIFY_DTC_STORE }}
          SHOPIFY_DTC_TOKEN: ${{ secrets.SHOPIFY_DTC_TOKEN }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:        ${{ secrets.GMAIL_PASS }}
          GMAIL_FROM:        ${{ secrets.GMAIL_FROM }}
          RECIPIENTS_DTC:    ${{ secrets.RECIPIENTS_DTC }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATE_RANGE:        ${{ github.event.inputs.date_range || 'yesterday' }}
        run: node send-report.js --schedule dtc
